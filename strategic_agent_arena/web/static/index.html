<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strategic Agent Arena</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/styles.css?v=20260508-fixed-maps" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Supply Graph War</h1>
          <div id="statusLine" class="status-line">Loading</div>
        </div>
        <div class="score-strip" aria-label="scoreboard">
          <div class="score-block player-zero">
            <span>P0</span>
            <strong id="score0">0</strong>
          </div>
          <div class="score-block player-one">
            <span>P1</span>
            <strong id="score1">0</strong>
          </div>
        </div>
      </header>

      <main class="workbench">
        <aside class="panel controls-panel">
          <section>
            <h2>Match</h2>
            <label>
              Seed
              <input id="seedInput" type="number" value="7" />
            </label>
            <label>
              Map
              <select id="mapInput"></select>
            </label>
            <label>
              Max rounds
              <input id="roundsInput" type="number" min="1" max="500" value="80" />
            </label>
          </section>

          <section>
            <h2>Agents</h2>
            <label>
              Player 0
              <select id="agent0Input"></select>
            </label>
            <label>
              Player 1
              <select id="agent1Input"></select>
            </label>
          </section>

          <section>
            <h2>Run</h2>
            <div class="button-row">
              <button id="resetButton" type="button">Reset</button>
              <button id="stepButton" type="button">Step</button>
              <button id="roundButton" type="button">Round</button>
              <button id="playButton" type="button">Play</button>
            </div>
            <label>
              Speed
              <input id="speedInput" type="range" min="120" max="1400" step="40" value="520" />
            </label>
          </section>

          <section class="metric-grid" aria-label="match metrics">
            <div>
              <span>Owned</span>
              <strong id="ownedMetric">0 / 0</strong>
            </div>
            <div>
              <span>Supplied</span>
              <strong id="suppliedMetric">0 / 0</strong>
            </div>
            <div>
              <span>Units</span>
              <strong id="unitsMetric">0 / 0</strong>
            </div>
            <div>
              <span>Neutral</span>
              <strong id="neutralMetric">0</strong>
            </div>
          </section>
        </aside>

        <section class="board-panel">
          <svg id="graphSvg" role="img" aria-label="Supply Graph War map"></svg>
        </section>

        <aside class="panel detail-panel">
          <section>
            <h2>Node</h2>
            <div id="nodeDetails" class="details-empty">Select a city</div>
          </section>

          <section>
            <h2>Legal Actions</h2>
            <div id="legalActions" class="list-box"></div>
          </section>

          <section class="log-section">
            <h2>Action Log</h2>
            <div id="actionLog" class="list-box log-box"></div>
          </section>
        </aside>
      </main>
    </div>

    <script src="/static/app.js?v=20260508-fixed-maps"></script>
  </body>
</html>
